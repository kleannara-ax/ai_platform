# ============================================================
#  플랫폼 공통 설정
# ============================================================

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Apache Reverse Proxy 환경 대응
  # Apache에서 X-Forwarded-* 헤더를 전달받아 원본 요청 정보를 복원
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

spring:
  application:
    name: platform

  # ── DataSource (MariaDB 10.11.15) ──
  datasource:
    url: jdbc:mariadb://localhost:3306/platform_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: platform_user
    password: ${DB_PASSWORD:platform_pass}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: PlatformHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ── JPA / Hibernate ──
  jpa:
    # DDL 자동 생성 비활성화 + 물리 네이밍 전략 (대문자 테이블명 유지)
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    # Hibernate Dialect: MariaDB 10.3+ 이상 지원 (10.11 기준)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        # 2차 캐시 비활성화
        cache:
          use_second_level_cache: false
          use_query_cache: false
    # SQL 로깅 (개발 시 true, 운영 시 false)
    show-sql: false
    open-in-view: false

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

# ── JWT 설정 ──
jwt:
  # Base64 인코딩된 256비트 이상의 시크릿 키 (운영 환경에서는 환경변수로 관리)
  secret: ${JWT_SECRET:Y29tcGFueS1wbGF0Zm9ybS1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0LW11c3QtYmUtbG9uZy1lbm91Z2g=}
  # Access Token 유효시간: 1시간 (밀리초)
  access-token-expiration: 3600000
  # Refresh Token 유효시간: 7일 (밀리초)
  refresh-token-expiration: 604800000

# ── PS-INSP 모듈 설정 ──
ps-insp:
  upload:
    dir: /data/upload/ps_cov_ins   # 이미지 저장 경로
  mes:
    endpoint-url:                   # MES 전송 URL (비어있으면 mock 모드)

# ── 로깅 ──
logging:
  level:
    root: INFO
    com.company: DEBUG
    com.company.module.psinsp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    path: ./logs
