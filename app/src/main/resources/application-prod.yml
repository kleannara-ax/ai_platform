# ============================================================
#  운영 환경 설정
# ============================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:platform_db}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:platform_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

jwt:
  # JWT_SECRET 환경변수가 없으면 서버 시작 시 자동 생성 (재시작 시 기존 토큰 무효화)
  # 운영 환경에서 고정 키를 사용하려면: JWT_SECRET=<openssl rand -base64 64 결과값>
  secret: ${JWT_SECRET:}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# ── PS-INSP 모듈 설정 ──
ps-insp:
  upload:
    dir: ${PS_INSP_UPLOAD_DIR:/data/upload/ps_cov_ins}

logging:
  level:
    root: WARN
    com.company: INFO
    org.hibernate.SQL: WARN
  file:
    path: /data/aiplatform/logs
