# ============================================================
#  Apache HTTP Server - Reverse Proxy 설정
#  Rocky Linux 9 + Apache 2.4 (mod_proxy, mod_proxy_http)
#
#  설치:
#    dnf install httpd mod_ssl
#    systemctl enable httpd
#    systemctl start httpd
#
#  모듈 활성화 확인:
#    httpd -M | grep proxy
#    → proxy_module, proxy_http_module 확인
#
#  설정 파일 위치:
#    /etc/httpd/conf.d/platform.conf
# ============================================================

<VirtualHost *:80>
    ServerName platform.company.local
    ServerAlias platform

    # ── 로그 설정 ──
    ErrorLog  /var/log/httpd/platform_error.log
    CustomLog /var/log/httpd/platform_access.log combined

    # ── 요청 ID 생성 (로깅 추적용) ──
    # mod_unique_id 사용
    RequestHeader set X-Request-Id "%{UNIQUE_ID}e"

    # ── Proxy 기본 설정 ──
    ProxyRequests     Off
    ProxyPreserveHost On

    # ── X-Forwarded 헤더 설정 ──
    # Spring Boot의 server.forward-headers-strategy=framework와 연동
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port  "80"

    # ── Reverse Proxy 규칙 ──
    # 모든 /api/** 요청을 Spring Boot (localhost:8080)로 전달
    # API Prefix 방식으로 통일 → Context Path 없이 Prefix만 사용
    ProxyPass        /api http://127.0.0.1:8080/api
    ProxyPassReverse /api http://127.0.0.1:8080/api

    # ── 타임아웃 설정 ──
    ProxyTimeout 300

    # ── Health Check ──
    <Location /api/health>
        ProxyPass        http://127.0.0.1:8080/api/health
        ProxyPassReverse http://127.0.0.1:8080/api/health
    </Location>

    # ── 접근 제어 (내부망 전용) ──
    <Proxy *>
        Require ip 10.0.0.0/8
        Require ip 172.16.0.0/12
        Require ip 192.168.0.0/16
        Require ip 127.0.0.1
    </Proxy>

</VirtualHost>

